# Annotated reference config for trammel.
#
# Layout assumptions (illustrative — adapt to your repo):
#   src/app/        — pure orchestration; no HTTP, no SQL
#   src/system/     — adapters and stubs for ports
#   src/db/         — SQL queries and migrations
#   src/transports/ — HTTP, CLI, anything that talks to the outside world
#   src/tests.rs    — top-level integration tests

# Override only when the source root is not `src/`.
src_root = "src"

# ── Layers ───────────────────────────────────────────────────────────────────
# Path classification is FIRST-MATCH in declaration order. A file matching no
# layer is skipped by per-layer rules.

[[layers]]
name = "app"
paths = ["app/**"]

[[layers]]
name = "system"
paths = ["system/**"]
# Files where this layer's rules are skipped. Use sparingly: every entry is a
# claim that a boundary exception is correct.
exempt_files = ["system/connectors/db.rs"]

[[layers]]
name = "transports_web"
paths = ["transports/web/**"]
exempt_files = ["transports/web/middleware.rs"]

[[layers]]
name = "transports_cli"
paths = ["transports/cli/**"]

[[layers]]
name = "db"
paths = ["db/**"]

[[layers]]
name = "tests"
paths = ["tests.rs", "tests/**"]
# Treat every file in this layer as cfg(test) for `allow_in_test_context`.
implicit_test_context = true

# ── forbidden_imports ────────────────────────────────────────────────────────
# `*` matches any chars including `::`. {pattern} in `message` substitutes the
# offending pattern.

[[forbidden_imports]]
in_layers = ["app"]
patterns = ["axum*", "*transports*", "sqlx*"]
rule = "APP_BOUNDARY"
message = "app/ must not import {pattern} — keep app/ pure orchestration"

[[forbidden_imports]]
in_layers = ["system"]
patterns = ["axum*"]
rule = "SYSTEM_NO_AXUM"

# ── forbidden_inline_paths ───────────────────────────────────────────────────
# Catches fully-qualified path references that imports don't surface, e.g.
# `let _ = crate::db::find();` or `fn x(_: db::User)`.

[[forbidden_inline_paths]]
in_layers = ["transports_web", "transports_cli"]
patterns = ["db", "db::*", "crate::db*", "sqlx", "sqlx::*"]
position = "any"   # "expr" | "type" | "any"
rule = "TRANSPORTS_NO_DB"
allow_in_test_context = true

[[forbidden_inline_paths]]
in_files = ["src/transports/web/router.rs"]
patterns = ["app::*"]
position = "expr"
rule = "ROUTER_NO_APP"

# ── forbidden_constructors ───────────────────────────────────────────────────
# Same engine as forbidden_inline_paths; the alternate name reads better
# for "this constructor / associated call may only run in one layer".
#
# `in_layers_except` is the inverse of `in_layers`: the rule applies to every
# layer EXCEPT those listed. Adding a new layer (e.g. `wasm`) automatically
# extends the rule's reach — no per-rule edit. Mutually exclusive with
# `in_layers` on a single entry.

[[forbidden_constructors]]
in_layers_except = ["system"]   # "system" is this project's side-effect leaf
patterns = [
  "Utc::now", "Local::now", "SystemTime::now", "Instant::now",
  "Uuid::new_v4", "Uuid::now_v7",
]
position = "any"
allow_in_test_context = true
rule = "DETERMINISM_LEAF"
message = "Time/id construction `{path}` outside system/. Inject via state."

# ── forbidden_macros ─────────────────────────────────────────────────────────
# `qualified_names` matches the full `::`-joined macro path.
# `bare_names` is exact-match on the final segment, scoped by
# `bare_names_in_layers` (so `query!()` only flags where the unqualified name
# is unambiguous).

[[forbidden_macros]]
in_layers = ["app", "system", "transports_web", "transports_cli"]
qualified_names = ["sqlx::*"]
bare_names = ["query", "query_as", "query_scalar", "query_unchecked"]
bare_names_in_layers = ["app", "system"]
rule = "NO_SQL_OUTSIDE_DB"
allow_in_test_context = true

# ── forbidden_methods ────────────────────────────────────────────────────────

[[forbidden_methods]]
in_layers = ["app", "system", "db", "transports_web", "transports_cli"]
methods = ["unwrap", "expect"]
allow_in_test_context = true
rule = "NO_UNWRAP_IN_PRODUCTION"

# ── required_struct_attrs ────────────────────────────────────────────────────
# Stubs in system/ must be cfg-gated. Loose-match on attribute token tree
# substring (after whitespace normalization).

[[required_struct_attrs]]
in_layers = ["system"]
struct_name_pattern = "Stub*"
required_any_of = [
  "cfg(test)",
  'cfg(any(test, feature = "testing"))',
]
also_apply_to_impls = true
rule = "STUBS_MUST_BE_GATED"

# ── fs_layout ────────────────────────────────────────────────────────────────
# Filesystem assertions, evaluated once per run. Paths are PROJECT-ROOT
# relative (not src_root).

[[fs_must_exist]]
path = "src/lib.rs"
rule = "LIB_IS_FILE"
message = "library root must be src/lib.rs"

[[fs_must_not_exist]]
paths = [
  "src/lib",                      # don't accidentally split lib.rs into a dir
  "src/app_state.rs",             # state belongs in app/, not at the root
  "src/adapters",                 # legacy adapters layout — use system/
  "src/transports/extractors",    # extractors moved into transports/web/
]
rule = "FORBIDDEN_PATHS"

# ── file_content_scan ────────────────────────────────────────────────────────
# Substring scan over a glob — for non-Rust files (templates) and for catching
# rendered method calls regardless of qualification.

[[file_content_scan]]
glob = "src/transports/web/templates/**"
forbidden_substrings = ["session.persona"]
rule = "TEMPLATE_NO_PERSONA_CHECK"

[[file_content_scan]]
glob = "src/transports/**/*.rs"
exclude_glob = "src/transports/web/templates/**"
forbidden_substrings = [".is_admin()"]
rule = "TRANSPORT_NO_IS_ADMIN"

# ── n_plus_one ───────────────────────────────────────────────────────────────
# Loop or iterator combinator + `.await` on a configured DB-touching expression.
# `layer_assumes_query` says "in this layer, every await is a query — skip
# the path scan." Suitable for db/.
#
# Opt out at the fn level with the configured attribute. Match is on the
# attribute's FINAL segment, so both #[allow_n_plus_one] and
# #[trammel_attrs::allow_n_plus_one] satisfy this rule.

[n_plus_one]
in_layers = ["app", "db"]
db_path_patterns = ["db", "db::*", "crate::db*", "sqlx", "sqlx::*"]
db_macros = ["query", "query_as", "query_scalar", "query_unchecked"]
combinators = [
  "map", "for_each", "for_each_concurrent", "then", "and_then",
  "filter_map", "flat_map", "fold",
  "try_for_each", "try_for_each_concurrent", "try_fold",
  "inspect",
]
opt_out_attribute = "allow_n_plus_one"
layer_assumes_query = ["db"]
rule = "N_PLUS_ONE"
